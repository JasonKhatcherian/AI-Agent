<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>AI-AGENT</title>
</head>

<body>
    <div class="container">
        <div class="leftpanel">
            <button class="newchat" type="button" onclick="createNewChat()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="newchat-icon">
            <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"></path>
        </svg><span>New chat</span></button>
            <h3 id="recent">Recents
            </h3>
            <div class="history"></div>
        </div>

        <div class="chatbox">
            <button class="toggle-btn" onclick="togglePanel()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="M9 3v18" />
                </svg>
            </button>
            <h2 class="title" id="title-switch">What’s on your mind today?</h2>
            <div class="menu-dropdown-container">
            <button class="menu-dots-btn" onclick="toggleDropdown(event)">•••</button>
            <div id="dropdown-menu" class="dropdown-content">
                <button class="dropdown-item" id="click-image-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <span class="theme-text">Toggle Dark Mode</span>
                </button>
                <button class="dropdown-item delete-btn" onclick="handleDelete()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Delete Chat
                </button>
            </div>
        </div>
            <svg id="temp-image" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: block; cursor: pointer; color: #8e8e93;">
    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
    <circle cx="12" cy="12" r="3"></circle>
    <polyline points="12 10.5 12 12 13 12.5"></polyline>
</svg>
            <div id="chat-history" class="chat-history"></div>
            <div class="input-container">
                <textarea class="search" placeholder="Ask Anything" onkeydown="if(event.key === 'Enter') { event.preventDefault(); saveData(event); }"></textarea>
                <button class="sender" type="button" onclick="saveData(event)"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
    </svg></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
