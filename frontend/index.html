<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
        <defs><linearGradient id='aiGradient' x1='0%' y1='0%' x2='100%' y2='100%'>
            <stop offset='0%' stop-color='%236366F1'/><stop offset='100%' stop-color='%23A855F7'/>
        </linearGradient><linearGradient id='sparkleGrad' x1='0%' y1='0%' x2='100%' y2='100%'>
            <stop offset='0%' stop-color='%23FFFFFF'/><stop offset='100%' stop-color='%23E0E7FF'/>
        </linearGradient></defs><rect x='2' y='2' width='60' height='60' rx='16' fill='url(%23aiGradient)'/>
        <circle cx='32' cy='32' r='6' fill='%23FFFFFF'/><circle cx='20' cy='22' r='3.5' fill='%23E0E7FF'/>
        <circle cx='44' cy='22' r='3.5' fill='%23E0E7FF'/><circle cx='20' cy='42' r='3.5' fill='%23E0E7FF'/>
        <circle cx='44' cy='42' r='3.5' fill='%23E0E7FF'/>
        <path d='M20 22 L32 32 M44 22 L32 32 M20 42 L32 32 M44 42 L32 32' stroke='%23E0E7FF' stroke-width='2.5' stroke-linecap='round'/>
        <path d='M48 12 Q48 18 54 18 Q48 18 48 24 Q48 18 42 18 Q48 18 48 12 Z' fill='url(%23sparkleGrad)'/>
        <path d='M16 46 Q16 50 20 50 Q16 50 16 54 Q16 50 12 50 Q16 50 16 46 Z' fill='url(%23sparkleGrad)' opacity='0.8'/></svg>">
    <title>AI-AGENT</title>
</head>

<body>
    <div class="container">
        <div class="leftpanel">
            <button class="newchat" id="new-chat-btn" type="button" onclick="createNewChat()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="newchat-icon">
                    <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"></path>
                </svg>
                <span>New Chat</span>
            </button>
            <h3 id="recent">Recents</h3>
            <div class="history"></div>
        </div>

        <div class="chatbox">
            <button class="toggle-btn" onclick="togglePanel()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="3" rx="2" />
                    <path d="M9 3v18" />
                </svg>
            </button>
            <h2 class="title" id="title-switch">What’s on your mind today?</h2>
            <div class="menu-dropdown-container">
            <button class="menu-dots-btn" onclick="toggleDropdown(event)">•••</button>
            <div id="dropdown-menu" class="dropdown-content">
                <button class="dropdown-item" id="click-image-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <span class="theme-text">Toggle Dark Mode</span>
                </button>
                <button class="dropdown-item delete-btn" onclick="handleDelete()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                    Delete Chat
                </button>
            </div>
        </div>
            <svg id="temp-image" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: block; cursor: pointer;">
    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
    <circle cx="12" cy="12" r="3"></circle>
    <polyline points="12 10.5 12 12 13 12.5"></polyline>
</svg>
            <div id="chat-history" class="chat-history"></div>
            <div class="input-container">
                <textarea class="search" placeholder="Ask Anything" onkeydown="if(event.key === 'Enter') { event.preventDefault(); saveData(event); }"></textarea>
                <button class="sender" type="button" id="mic-btn" aria-label="Record Audio">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
        </svg>
    </button>

    <!-- Send button (Hidden by default, shown when user types) -->
    <button class="sender hidden" type="button" id="send-btn" onclick="saveData(event)" aria-label="Send Message">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
    </button>
            </div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>

</html>
